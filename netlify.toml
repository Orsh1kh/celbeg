# ═══════════════════════════════════════════════════════════
# CELBEG.MN — Netlify тохиргоо
# ═══════════════════════════════════════════════════════════

[build]
  publish       = "."
  functions     = "netlify/functions"

# SPA-шиг hash routing ашиглаж байгаа тул бүх замыг index.html руу
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Static asset cache ─────────────────────────────────────
# JS/CSS файл-д hash байхгүй тул богино cache, revalidate заавал
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Зураг өөрчлөгдөх магадлал бага тул урт cache
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── HTML cache-гүй ─────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── PWA-д cache-гүй файлууд ────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
    Content-Type = "application/manifest+json"

# ── Security headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
